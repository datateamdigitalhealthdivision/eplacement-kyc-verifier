version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
loggers:
  eplacement_kyc:
    level: INFO
    handlers: [console]
    propagate: false
root:
  level: INFO
  handlers: [console]
